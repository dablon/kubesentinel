name: Release

on:
  push:
    branches: [main, master]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v -coverprofile=coverage.out ./internal/... ./pkg/...

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Extract version from code
        id: version
        run: |
          VERSION=$(grep 'var version' cmd/kubesentinel/main.go | sed 's/.*"\(.*\)".*/\1/')
          echo "VERSION=v${VERSION}" >> $GITHUB_OUTPUT
          echo "Detected version: v${VERSION}"

      - name: Check if tag already exists
        id: check_tag
        run: |
          TAG=${{ steps.version.outputs.VERSION }}
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag $TAG already exists, skipping release"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag $TAG does not exist, will create release"
          fi

      - name: Build multiplatform binaries
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          LDFLAGS="-s -w -X main.version=${VERSION}"
          mkdir -p dist

          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="${LDFLAGS}" -o dist/kubesentinel-linux-amd64 ./cmd/kubesentinel
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="${LDFLAGS}" -o dist/kubesentinel-linux-arm64 ./cmd/kubesentinel
          GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="${LDFLAGS}" -o dist/kubesentinel-darwin-amd64 ./cmd/kubesentinel
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="${LDFLAGS}" -o dist/kubesentinel-darwin-arm64 ./cmd/kubesentinel
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="${LDFLAGS}" -o dist/kubesentinel-windows-amd64.exe ./cmd/kubesentinel

      - name: Generate checksums
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Create tag and release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: ${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: |
            dist/kubesentinel-linux-amd64
            dist/kubesentinel-linux-arm64
            dist/kubesentinel-darwin-amd64
            dist/kubesentinel-darwin-arm64
            dist/kubesentinel-windows-amd64.exe
            dist/checksums.txt
