name: Build and Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - name: Build
        run: |
          GOOS=linux GOARCH=amd64 go build -o kubesentinel-linux-amd64 ./cmd
          GOOS=linux GOARCH=arm64 go build -o kubesentinel-linux-arm64 ./cmd
          GOOS=darwin GOARCH=amd64 go build -o kubesentinel-darwin-amd64 ./cmd
          GOOS=darwin GOARCH=arm64 go build -o kubesentinel-darwin-arm64 ./cmd
          GOOS=windows GOARCH=amd64 go build -o kubesentinel-windows-amd64.exe ./cmd
      - name: Test
        run: go test ./...
      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.0
          files: |
            kubesentinel-linux-amd64
            kubesentinel-linux-arm64
            kubesentinel-darwin-amd64
            kubesentinel-darwin-arm64
            kubesentinel-windows-amd64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
